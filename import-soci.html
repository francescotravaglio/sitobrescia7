<script>
firebase.initializeApp({
    apiKey: "AIzaSyCABGrbUk5baqcak-iejkJtDsfkaY66III",
    authDomain: "agescibrescia7-508b0.firebaseapp.com",
    projectId: "agescibrescia7-508b0",
    storageBucket: "agescibrescia7-508b0.firebasestorage.app",
    messagingSenderId: "738190317173",
    appId: "1:738190317173:web:6ee596fc6e09494f04ca3c"
});
const db = firebase.firestore();
const log = document.getElementById('log');

function addLog(msg, color) {
    const line = document.createElement('div');
    line.textContent = msg;
    if (color) line.style.color = color;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
}

async function runImport() {
    document.getElementById('btn').disabled = true;
    document.getElementById('btn').textContent = 'Importazione in corso…';
    log.innerHTML = '';

    // Load JSON data embedded below
    const soci = SOCI_DATA;
    addLog(`Trovati ${soci.length} soci. Inizio batch write…`);

    const CHUNK = 400; // Firestore batch limit 500
    let ok = 0, err = 0;

    for (let i = 0; i < soci.length; i += CHUNK) {
        const chunk = soci.slice(i, i + CHUNK);
        const batch = db.batch();
        chunk.forEach(row => {
            const codice = String(row.CodiceSocio || '').trim();
            if (!codice) return;
            const ref = db.collection('soci_lista').doc(codice);
            batch.set(ref, row);
        });
        try {
            await batch.commit();
            chunk.forEach(row => {
                addLog(`  OK ${row.CodiceSocio} - ${row.Nome} ${row.Cognome}`, '#16a34a');
                ok++;
            });
        } catch(e) {
            addLog(`  ERRORE batch: ${e.message}`, '#dc2626');
            err += chunk.length;
        }
    }

    const msg = `Completato: ${ok} importati, ${err} errori.`;
    addLog('\n' + msg, ok > 0 ? '#16a34a' : '#dc2626');
    const res = document.getElementById('result');
    res.textContent = msg;
    res.style.color = ok > 0 ? '#16a34a' : '#dc2626';
    res.classList.remove('hidden');
    document.getElementById('btn').textContent = 'Fatto!';
}
</script>
